<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Happy Birthday!</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-day: #8ecae6;
        --bg-night: #08112b;
        --sun: #ffd166;
        --moon: #e0e7ff;
        --text-day: #12355b;
        --text-night: #e8f1ff;
        --mountain: #2b3f6a;
        --grass: #2f8051;
        --flower: #ff6b6b;
        --butterfly: #ffb703;
      }
      *{box-sizing:border-box}
      body{margin:0;min-height:100vh;font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;background:linear-gradient(180deg,var(--bg-day),#cbe6ff 45%,#8ecae6);color:var(--text-day);overflow-x:hidden;transition:background 0.9s ease,color 0.9s ease}
      body.night, .night{background:linear-gradient(180deg,#08112b 0%,#11204b 35%,#10284e 100%);color:var(--text-night)}
      .page{min-height:100vh;position:relative;padding:1.5rem 1rem;display:grid;place-items:center}
      .scene{position:relative;width:min(100%,1120px);max-width:1120px;min-height:720px;border-radius:32px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.35);background:transparent}
      .sky{position:absolute;inset:0;transition:background 0.9s ease}
      .sun, .moon{position:absolute;top:4%;left:10%;width:130px;height:130px;border-radius:50%;box-shadow:0 0 90px rgba(255,209,96,.45);transition:transform 0.9s ease,opacity 0.9s ease,filter 0.9s ease}
      .moon{background:radial-gradient(circle at 35% 35%,#f8f9ff 0 42%,transparent 44%),#b2c1ff;filter:drop-shadow(0 0 30px rgba(224,231,255,.5));opacity:0}
      .night .sun{transform:translateY(-140px);opacity:0}
      .night .moon{opacity:1;transform:translateY(20px)}
      .ground{position:absolute;left:0;bottom:0;width:100%;height:42%;background:linear-gradient(180deg,#14426a 0%,#1e5371 60%,#244e68 100%)}
      .mountains{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:120%;height:60%;pointer-events:none}
      .mountain{position:absolute;bottom:0;left:50%;width:46%;height:160%;background:linear-gradient(180deg,#284770 0%,#18304f 100%);clip-path:polygon(0 100%,24% 33%,45% 46%,62% 18%,78% 35%,100% 100%);}
      .mountain::after{content:'';position:absolute;left:18%;top:5%;width:26%;height:16%;background:rgba(255,255,255,.18);clip-path:polygon(0 0,100% 0,80% 100%,0% 100%)}
      .flower-bed{position:absolute;left:5%;bottom:4%;width:22%;aspect-ratio:2.2;display:flex;flex-wrap:wrap;align-content:flex-end;gap:14px;pointer-events:none}
      .flower{width:20px;height:20px;border-radius:50%;background:var(--flower);box-shadow:0 0 16px rgba(255,107,107,.35)}
      .flower:nth-child(2){background:#ffb703}
      .flower:nth-child(3){background:#98d7c2}
      .flower:nth-child(4){background:#f48c06}
      .flower:nth-child(5){background:#ff6f91}
      .butterfly{position:absolute;width:78px;height:60px;left:84%;top:42%;pointer-events:none;transition:transform 0.9s ease}
      .wing{position:absolute;width:54px;height:44px;border-radius:50%;background:var(--butterfly);box-shadow:0 0 40px rgba(255,183,3,.3)}
      .wing.left{left:0;transform:rotate(-20deg)}
      .wing.right{right:0;transform:rotate(20deg)}
      .body{position:absolute;left:50%;top:10px;width:10px;height:40px;background:#3b2d22;border-radius:999px;transform:translateX(-50%)}
      .message-card{position:absolute;left:50%;top:9%;width:min(92%,720px);transform:translateX(-50%);background:rgba(4,18,46,.88);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.15);border-radius:26px;padding:1.8rem;box-shadow:0 24px 60px rgba(0,0,0,.25);z-index:5}
      .message-card h1{margin:.1rem 0 .5rem;font-size:clamp(2.5rem,4vw,4.2rem);letter-spacing:.04em}
      .message-card p{margin:0;font-size:1.05rem;line-height:1.65;color:#e2e8f0}
      .controls{position:absolute;right:2rem;bottom:2rem;display:flex;flex-wrap:wrap;gap:.75rem}
      .controls button{border:none;border-radius:999px;padding:.8rem 1.1rem;font-weight:700;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease}
      .controls button:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(0,0,0,.2)}
      .btn-day{background:#ffb703;color:#102a43}
      .btn-night{background:#3a5f99;color:#f8fafc}
      .btn-rain{background:#0ea5e9;color:#fff}
      .rain-layer{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 0.8s ease}
      .rain-layer.active{opacity:1}
      .raindrop{position:absolute;top:-12px;width:3px;height:20px;background:rgba(255,255,255,.8);border-radius:999px;filter:blur(1px);animation:fall 1.1s linear infinite}
      .raindrop:nth-child(odd){animation-duration:1.3s}
      .raindrop:nth-child(3n){height:32px;opacity:.72}
      @keyframes fall {to{transform:translateY(110vh)}}
      .rain-text{position:absolute;left:50%;top:62%;transform:translateX(-50%);color:#f8fafc;font-size:2rem;font-weight:700;opacity:0;transition:opacity .8s ease}
      .rain-text.active{opacity:1}
      .sunrise-text, .night-text{position:absolute;left:50%;top:25%;transform:translateX(-50%);font-size:2rem;font-weight:700;text-align:center;opacity:0;pointer-events:none;transition:opacity .5s ease}
      .show-sunrise{opacity:1}
      .show-night{opacity:1}
      .floral{position:absolute;left:9%;bottom:18%;width:13%;height:18%;background:radial-gradient(circle,#7cc29b 10%,transparent 45%);border-radius:999px;opacity:.7}
      .mountain::before{content:'';position:absolute;top:6%;left:18%;width:20%;height:13%;background:rgba(255,255,255,.14);border-radius:50%}
      @media(max-width:820px){.message-card{top:6%;padding:1.4rem}.controls{position:static;justify-content:center;margin-top:1rem}.butterfly{left:70%;top:30%}}  
    </style>
  </head>
  <body>
    <div class="page">
      <div class="scene" id="scene">
        <div class="sky"></div>
        <div class="sun"></div>
        <div class="moon"></div>
        <div class="ground"></div>
        <div class="mountains"><div class="mountain"></div></div>
        <div class="floral"></div>
        <div class="flower-bed">
          <div class="flower"></div>
          <div class="flower"></div>
          <div class="flower"></div>
          <div class="flower"></div>
          <div class="flower"></div>
          <div class="flower"></div>
          <div class="flower"></div>
          <div class="flower"></div>
        </div>
        <div class="butterfly" id="butterfly">
          <div class="wing left"></div>
          <div class="wing right"></div>
          <div class="body"></div>
        </div>
        <div class="message-card" id="wishCard">
          <h1>Happy Birthday, Friend!</h1>
          <p>Click the buttons below to switch between day, night, and rain. Each mode will bring a special animation for your birthday wish.</p>
        </div>
        <div class="rain-layer" id="rainLayer"></div>
        <div class="rain-text" id="rainText">Happy Birthday! Let the rains bring joy.</div>
        <div class="sunrise-text" id="sunriseText">Sunrise wishes for a bright year ahead!</div>
        <div class="night-text" id="nightText">Good night birthday dreamer — make a wish!</div>
      </div>
      <div class="controls">
        <button class="btn-day" id="dayBtn">Day</button>
        <button class="btn-night" id="nightBtn">Night</button>
        <button class="btn-rain" id="rainBtn">Rain</button>
      </div>
    </div>

    <script>
      const body = document.body;
      const scene = document.getElementById('scene');
      const dayBtn = document.getElementById('dayBtn');
      const nightBtn = document.getElementById('nightBtn');
      const rainBtn = document.getElementById('rainBtn');
      const rainLayer = document.getElementById('rainLayer');
      const rainText = document.getElementById('rainText');
      const sunriseText = document.getElementById('sunriseText');
      const nightText = document.getElementById('nightText');
      const butterfly = document.getElementById('butterfly');

      function clearModes(){
        body.classList.remove('night');
        rainLayer.classList.remove('active');
        rainText.classList.remove('active');
        sunriseText.classList.remove('active');
        nightText.classList.remove('active');
        butterfly.style.transform = 'translate(0, 0) rotate(0deg)';
        butterfly.style.opacity = '1';
      }

      function createRain(){
        rainLayer.innerHTML = '';
        const drops = 38;
        for(let i=0;i<drops;i++){
          const drop = document.createElement('span');
          drop.className = 'raindrop';
          const left = Math.random() * 100;
          const delay = -(Math.random() * 1.2);
          const duration = 0.7 + Math.random() * 1.2;
          drop.style.left = `${left}%`;
          drop.style.animationDelay = `${delay}s`;
          drop.style.animationDuration = `${duration}s`;
          rainLayer.appendChild(drop);
        }
      }

      function showDay(){
        clearModes();
        body.classList.remove('night');
        scene.style.background = 'transparent';
        sunriseText.classList.add('show-sunrise');
        butterfly.style.transform = 'translate(-20px, -20px) rotate(-10deg)';
      }

      function showNight(){
        clearModes();
        body.classList.add('night');
        nightText.classList.add('show-night');
        butterfly.style.transform = 'translate(20px, -35px) rotate(15deg)';
      }

      function showRain(){
        clearModes();
        body.classList.add('night');
        rainLayer.classList.add('active');
        rainText.classList.add('active');
        butterfly.style.opacity = '0.6';
      }

      dayBtn.addEventListener('click', showDay);
      nightBtn.addEventListener('click', showNight);
      rainBtn.addEventListener('click', () => {
        createRain();
        showRain();
      });

      showDay();
    </script>
  </body>
</html>
